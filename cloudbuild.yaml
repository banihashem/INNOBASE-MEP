# ══════════════════════════════════════════════════════════════════════
# MEP-light™ — Cloud Build Pipeline
#
# Build steps:
#   1. Run scoring regression tests (fail-fast)
#   2. Run auth regression tests (fail-fast)
#   3. Build production Docker image (multi-runtime)
#   4. Push to Artifact Registry / GCR
#   5. Deploy to Cloud Run with Cloud SQL, Secret Manager, and ADK config
#
# Substitutions:
#   _GOOGLE_CLIENT_ID  — Google OAuth Client ID (required)
#   _CLOUD_SQL_CONN    — Cloud SQL connection name (default: innobase-mep-light:europe-west2:mep-light-db)
#   _REGION            — Deployment region (default: europe-west2)
#   _ADK_ENABLED       — Enable ADK service (default: false)
# ══════════════════════════════════════════════════════════════════════

steps:
  # Step 0: Validate required substitution variables
  - name: 'node:22-slim'
    id: 'validate-config'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ -z "${_GOOGLE_CLIENT_ID}" ]; then
          echo "FATAL: _GOOGLE_CLIENT_ID substitution variable is empty."
          echo "Usage: gcloud builds submit --substitutions=_GOOGLE_CLIENT_ID=your-client-id.apps.googleusercontent.com"
          exit 1
        fi
        if echo "${_GOOGLE_CLIENT_ID}" | grep -q " "; then
          echo "FATAL: _GOOGLE_CLIENT_ID contains whitespace. PowerShell substitution parsing likely failed."
          exit 1
        fi
        if ! echo "${_GOOGLE_CLIENT_ID}" | grep -q "\.apps\.googleusercontent\.com$"; then
          echo "FATAL: _GOOGLE_CLIENT_ID does not end with .apps.googleusercontent.com"
          exit 1
        fi
        echo "✓ _GOOGLE_CLIENT_ID is set (suffix: ...${_GOOGLE_CLIENT_ID: -6})"

  # Step 1: Install dependencies and run tests
  - name: 'node:22-slim'
    id: 'test'
    waitFor: ['validate-config']
    entrypoint: 'bash'
    args:
      - '-c'
      - 'npm ci && npm test && npx tsx tests/auth_regression.test.ts'

  # Step 2: Build production Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    waitFor: ['test']
    args:
      - 'build'
      - '--build-arg'
      - 'GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/market-entry-prioritizer:v4.3.7'
      - '-t'
      - 'gcr.io/$PROJECT_ID/market-entry-prioritizer:latest'
      - '.'

  # Step 4: Push image to registry BEFORE deploy
  # (Cloud Build's 'images' section pushes AFTER all steps, which is too late for deploy)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    waitFor: ['build-image']
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/market-entry-prioritizer:latest'

  # Step 4.5: Run database migrations via Cloud Run Job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'migrate'
    waitFor: ['push-image']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run jobs deploy migrate-production \
          --image gcr.io/$PROJECT_ID/market-entry-prioritizer:latest \
          --command node \
          --args backend/apply_migrations.js \
          --region ${_REGION} \
          --set-cloudsql-instances ${_CLOUD_SQL_CONN} \
          --set-secrets DB_PASSWORD=mep-db-password:latest \
          --update-env-vars DB_USER=mep_app,DB_NAME=mep_production

        gcloud run jobs execute migrate-production --region ${_REGION} --wait

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    waitFor: ['migrate']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'market-entry-prioritizer'
      - '--image'
      - 'gcr.io/$PROJECT_ID/market-entry-prioritizer:latest'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--add-cloudsql-instances'
      - '${_CLOUD_SQL_CONN}'
      - '--set-secrets'
      - 'DB_PASSWORD=mep-db-password:latest'
      - '--update-env-vars'
      - 'NODE_ENV=production,GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},CLOUD_SQL_CONNECTION=${_CLOUD_SQL_CONN},DB_NAME=mep_production,DB_USER=mep_app,ADK_ENABLED=${_ADK_ENABLED},SEED_ADMIN_EMAIL=ehsan.banihashem@gmail.com'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '3'
      - '--min-instances'
      - '1'
      - '--concurrency'
      - '80'
      - '--port'
      - '8080'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/market-entry-prioritizer:v4.3.7'
  - 'gcr.io/$PROJECT_ID/market-entry-prioritizer:latest'

substitutions:
  _GOOGLE_CLIENT_ID: ''  # REQUIRED — must be provided via --substitutions flag
  _CLOUD_SQL_CONN: 'innobase-mep-light:europe-west2:mep-light-db'
  _REGION: 'europe-west2'
  _ADK_ENABLED: 'controlled'

timeout: '900s'

options:
  logging: CLOUD_LOGGING_ONLY
